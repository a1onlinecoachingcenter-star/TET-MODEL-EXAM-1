    <script>
        const quizData = [
            // PART 1: NEW PSYCHOLOGY (1-30)
            { section: "பகுதி 1: உளவியல் (Psychology)", bClass: "border-psychology", sClass: "bg-psychology", q: "1. குழந்தை வளர்ச்சியில் 'முயன்று கற்றல்' (Trial and Error Learning) கொள்கையை முன்மொழிந்தவர் யார்?", a: ["பாவ்லவ்", "ஸ்கின்னர்", "தார்ண்டைக்", "கோலர்"], c: 2 },
            { bClass: "border-psychology", q: "2. அறிவுசார் வளர்ச்சி நிலைகளை (Stages of Cognitive Development) நான்கு நிலைகளாகப் பிரித்தவர் யார்?", a: ["புரூனர்", "ஜீன் பியாஜே", "எரிக்சன்", "கார்ல் ரோஜர்ஸ்"], c: 1 },
            { bClass: "border-psychology", q: "3. மனவெழுச்சி நுண்ணறிவு (Emotional Intelligence) என்ற கருத்தைப் பிரபலப்படுத்தியவர் யார்?", a: ["ஸ்பியர்மேன்", "டேனியல் கோல்மேன்", "ஸ்டெர்ன்பெர்க்", "கார்ட்னர்"], c: 1 },
            { bClass: "border-psychology", q: "4. எரிக்சனின் மனச்சமூக வளர்ச்சி நிலைகளில் 'நம்பிக்கை VS நம்பிக்கை இன்மை' எக்காலகட்டத்தில் நிகழ்கிறது?", a: ["பிறப்பு முதல் 1.5 வயது வரை", "3 முதல் 6 வயது வரை", "6 முதல் 12 வயது வரை", "குமரிப்பருவம்"], c: 0 },
            { bClass: "border-psychology", q: "5. கற்றலில் 'உட்காட்சி வழிக் கற்றல்' (Insightful Learning) யாருடைய சோதனையுடன் தொடர்புடையது?", a: ["குரங்கு (சுல்தானா)", "பூனை", "எலி", "நாய்"], c: 0 },
            { bClass: "border-psychology", q: "6. மாஸ்லோவின் படிநிலைத் தேவைக் கோட்பாட்டில் மிக உயர்ந்த நிலையில் உள்ளது எது?", a: ["பாதுகாப்புத் தேவை", "தன்னைத் தான் உணர்தல் (Self-Actualization)", "அன்பு மற்றும் அங்கீகாரம்", "மதிப்பு மற்றும் மரியாதை"], c: 1 },
            { bClass: "border-psychology", q: "7. குமரிப்பருவம் ஒரு 'அழுத்தமும் கொந்தளிப்பும் நிறைந்த பருவம்' என்று கூறியவர் யார்?", a: ["ஜி. ஸ்டான்லி ஹால்", "வாட்சன்", "விலியம் ஜேம்ஸ்", "ஹென்றி முர்ரே"], c: 0 },
            { bClass: "border-psychology", q: "8. ஒரு குழந்தையின் 'மனவயது' (Mental Age) மற்றும் 'கால வயது' (Chronological Age) சமமாக இருந்தால், அந்த குழந்தையின் IQ எவ்வளவு?", a: ["80", "100", "120", "140"], c: 1 },
            { bClass: "border-psychology", q: "9. நுண்ணறிவின் 'பன்முக நுண்ணறிவுக் கோட்பாட்டை' (Multiple Intelligence) உருவாக்கியவர் யார்?", a: ["ஆல்பிரட் பினே", "ஹோவர்ட் கார்ட்னர்", "டெர்மன்", "வெக்ஸ்லர்"], c: 1 },
            { bClass: "border-psychology", q: "10. கீழ்க்கண்டவற்றுள் எது ஆளுமையை அளவிடும் 'புறத்தேற்று நுண்முறை' (Projective Technique)?", a: ["நேர்காணல்", "ரோர்ஷாக் மைத்தடம் சோதனை", "வினா நிரல்", "சுயசரிதை"], c: 1 },
            { bClass: "border-psychology", q: "11. ஒரு மாணவன் தேர்வில் தோல்வி அடைந்ததற்கு 'கேள்வித்தாள் கடினம்' என்று கூறுவது எந்தத் தற்காப்பு நடத்தை (Defense Mechanism)?", a: ["இடமாற்றம்", "காரணம் கற்பித்தல் (Rationalization)", "பின்வாங்கல்", "ஈடு செய்தல்"], c: 1 },
            { bClass: "border-psychology", q: "12. குழந்தைகளின் மொழி வளர்ச்சி பற்றி 'இயல்பறிவு வாதம்' (Nativism) கொள்கையை முன்வைத்தவர் யார்?", a: ["பி.எஃப். ஸ்கின்னர்", "நோம் சாம்ஸ்கி", "வைகாட்ஸ்கி", "பந்துரா"], c: 1 },
            { bClass: "border-psychology", q: "13. முதன்முதலில் 'உளவியல் ஆய்வுக்கூடத்தை' (Psychology Laboratory) ஜெர்மனியில் நிறுவியவர் யார்?", a: ["சிக்மண்ட் பிராய்டு", "விலியம் ஊண்ட்", "அட்லர்", "ஜங்"], c: 1 },
            { bClass: "border-psychology", q: "14. வைகாட்ஸ்கியின் 'அண்மை வளர்ச்சி மண்டலம்' (ZPD) எதைக் குறிக்கிறது?", a: ["குழந்தையின் தற்போதைய அறிவு", "உதவியுடன் செய்யக்கூடிய மற்றும் தனியாகச் செய்யக்கூடிய செயல்பாடுகளுக்கு இடையிலான இடைவெளி", "குழந்தையின் மரபணு திறன்", "குழந்தையின் உடல் வளர்ச்சி"], c: 1 },
            { bClass: "border-psychology", q: "15. ஆக்க நிலையுறுத்தக் கற்றலில் (Classical Conditioning) 'மணி சத்தம்' என்பது என்ன?", a: ["இயற்கையான தூண்டல்", "நிலையுறுத்தப்பட்ட தூண்டல் (CS)", "இயற்கையான துலங்கல்", "நிலையுறுத்தப்பட்ட துலங்கல்"], c: 1 },
            { bClass: "border-psychology", q: "16. 'மறதி வளைவு' (Forgetting Curve) பற்றிய ஆய்வுகளை மேற்கொண்டவர் யார்?", a: ["எபிங்காஸ்", "பார்ட்லெட்", "ஜேம்ஸ் லாஞ்ச்", "கேன் பாார்ட்"], c: 0 },
            { bClass: "border-psychology", q: "17. கல்வி உளவியலின் தந்தை என்று அழைக்கப்படுபவர் யார்?", a: ["பெஸ்டலாசி", "ஈ.எல். தார்ண்டைக்", "ரூஸோ", "ப்ரோபல்"], c: 1 },
            { bClass: "border-psychology", q: "18. குழந்தை மையக் கல்வியின் (Child-Centered Education) முக்கியத்துவத்தை வலியுறுத்தியவர்?", a: ["ஜான் டூயி", "ஹெர்பார்ட்", "பிளாட்டோ", "அரிஸ்டாட்டில்"], c: 0 },
            { bClass: "border-psychology", q: "19. ஒரு குறிப்பிட்டத் துறையில் ஒருவரின் இயல்பானத் திறமையை அளவிடுவது எது?", a: ["நுண்ணறிவு", "நாட்டம் (Aptitude)", "ஆளுமை", "மனப்பான்மை"], c: 1 },
            { bClass: "border-psychology", q: "20. சமூகக் கற்றல் கொள்கையை (Social Learning Theory) உருவாக்கியவர் யார்?", a: ["ஆல்பர்ட் பந்துரா", "குர்த் லெவின்", "டால்மன்", "ஹல்"], c: 0 },
            { bClass: "border-psychology", q: "21. முதிர்ச்சி (Maturation) என்பது எவ்வகை மாற்றம்?", a: ["கற்றலால் ஏற்படும் மாற்றம்", "உயிரியல் ரீதியான இயற்கை மாற்றம்", "சூழலால் ஏற்படும் மாற்றம்", "மன அழுத்தம்"], c: 1 },
            { bClass: "border-psychology", q: "22. குழந்தைகளின் ஒழுக்க வளர்ச்சியை (Moral Development) மூன்று நிலைகளாகப் பிரித்தவர் யார்?", a: ["லாரன்ஸ் கோல்பர்க்", "ஜீன் பியாஜே", "ஸ்டெர்ன்", "ஸ்ப்ராங்கர்"], c: 0 },
            { bClass: "border-psychology", q: "23. கீழ்க்கண்டவற்றுள் எது 'உயிரியல் உந்துதல்' (Biological Motive)?", a: ["சாதனை உந்துதல்", "பசி", "அங்கீகாரம்", "அதிகாரம்"], c: 1 },
            { bClass: "border-psychology", q: "24. கற்றல் மாற்றத்தில் (Transfer of Learning) 'ஒத்த கூறுக் கொள்கையை' கூறியவர் யார்?", a: ["ஜட்", "தார்ண்டைக்", "பாக்லி", "காக்னே"], c: 1 },
            { bClass: "border-psychology", q: "25. நுண்ணறிவின் 'இரு காரணிக் கொள்கையை' (Two Factor Theory) வழங்கியவர் யார்?", a: ["ஸ்பியர்மேன்", "தார்ண்டைக்", "தர்ஸ்டன்", "கில்போர்டு"], c: 0 },
            { bClass: "border-psychology", q: "26. உளப்பகுப்பாய்வு கோட்பாட்டில் (Psychoanalysis) 'உடனடி இன்பத்தை' விரும்புவது எது?", a: ["ஈகோ (Ego)", "இட் (Id)", "சூப்பர் ஈகோ (Super Ego)", "நனவு மனம்"], c: 1 },
            { bClass: "border-psychology", q: "27. 'எந்த ஒரு குழந்தையையும் என்னிடம் கொடுங்கள், நான் அவர்களை நீங்கள் விரும்பியபடி மாற்றிக் காட்டுகிறேன்' என்று கூறியவர்?", a: ["ஜே.பி. வாட்சன்", "பாவ்லவ்", "எட்கர் டேல்", "பிளேட்டோ"], c: 0 },

        ];

        let score = 0;
        const totalQuestions = quizData.length;
        const answeredQ = new Set();
        const quizContainer = document.getElementById('quiz-container');
        const scoreFloat = document.getElementById('score-float');

        function renderQuiz() {
            quizData.forEach((item, index) => {
                if (item.section) {
                    const h = document.createElement('h2');
                    h.className = `section-header ${item.sClass}`;
                    h.innerText = item.section;
                    quizContainer.appendChild(h);
                }

                const card = document.createElement('div');
                card.className = `question-card ${item.bClass}`;
                card.id = `q-${index}`;

                const qText = document.createElement('p');
                qText.className = "text-lg font-bold text-gray-800 mb-4";
                qText.innerText = (index + 1) + ". " + item.q;
                card.appendChild(qText);

                const optList = document.createElement('div');
                item.a.forEach((opt, i) => {
                    const btn = document.createElement('button');
                    btn.className = "option-btn";
                    
                    let prefix = "";
                    if (index >= 60 && index < 90) { // English section
                        prefix = String.fromCharCode(65 + i) + ") ";
                    } else {
                        prefix = ["அ) ", "ஆ) ", "இ) ", "ஈ) "][i];
                    }
                    
                    btn.innerText = prefix + opt;
                    btn.onclick = () => checkAnswer(index, i, btn);
                    optList.appendChild(btn);
                });
                card.appendChild(optList);
                quizContainer.appendChild(card);
            });
        }

        function checkAnswer(qIdx, selectedIdx, btn) {
            if (answeredQ.has(qIdx)) return;
            
            answeredQ.add(qIdx);
            const correctIdx = quizData[qIdx].c;
            const card = document.getElementById(`q-${qIdx}`);
            const buttons = card.querySelectorAll('.option-btn');

            if (selectedIdx === correctIdx) {
                btn.classList.add('correct');
                score++;
            } else {
                btn.classList.add('wrong');
                buttons[correctIdx].classList.add('correct');
            }

            buttons.forEach(b => b.classList.add('answered'));
            scoreFloat.innerText = `மதிப்பெண்: ${score} / ${totalQuestions}`;
        }

        window.onload = renderQuiz;
    </script>
